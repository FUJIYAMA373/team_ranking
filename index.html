<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卓球ランキング</title>
<style>
  body { font-family: sans-serif; margin: 0; background-color: #f0f0f5; padding-bottom: 60px; }
  .header { background-color: #0056b3; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
  .container { padding: 15px; display: none; }
  .active { display: block; }
  .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
  select, button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; background: white;}
  .score-board { display: flex; justify-content: space-between; align-items: center; text-align: center; margin: 15px 0; }
  .score-btn { width: 45px; height: 45px; font-size: 24px; background-color: #e0e0e0; border: none; border-radius: 5px; }
  .score-num { font-size: 30px; font-weight: bold; width: 40px; }
  .submit-btn { background-color: #28a745; color: white; font-weight: bold; border: none; margin-top: 20px; padding: 15px; }
  .tab-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: white; border-top: 1px solid #ccc; }
  .tab { flex: 1; padding: 15px; text-align: center; font-size: 14px; font-weight: bold; color: #666; }
  .tab.active-tab { color: #0056b3; border-bottom: 3px solid #0056b3; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
  th { background-color: #fafafa; color: #555; }
  .rank-1 { color: gold; font-weight: bold; }
  .rank-2 { color: silver; font-weight: bold; }
  .rank-3 { color: #cd7f32; font-weight: bold; }
  .loading { text-align: center; color: #888; padding: 20px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">🏓 卓球ランキング</div>

<div id="input-page" class="container active">
  <div class="card">
    <div id="loading-msg" class="loading">📡 魔法の黒板（スプレッドシート）から最新データを読み込み中...</div>
    <div id="input-area" style="display:none;">
      <label>選手A</label>
      <select id="playerA"></select>
      
      <div class="score-board">
        <button class="score-btn" onclick="changeScore('scoreA', -1)">-</button>
        <div id="scoreA" class="score-num">0</div>
        <button class="score-btn" onclick="changeScore('scoreA', 1)">+</button>
      </div>
      <div style="text-align:center; color:#888; font-size:12px;">※3セット先取</div>

      <hr style="border:0; border-top:1px dashed #ccc; margin:20px 0;">

      <label>選手B</label>
      <select id="playerB"></select>
      
      <div class="score-board">
        <button class="score-btn" onclick="changeScore('scoreB', -1)">-</button>
        <div id="scoreB" class="score-num">0</div>
        <button class="score-btn" onclick="changeScore('scoreB', 1)">+</button>
      </div>

      <button id="submit-btn" class="submit-btn" onclick="recordMatch()">結果を記録する</button>
    </div>
  </div>
</div>

<div id="ranking-page" class="container">
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>順位</th>
          <th>名前</th>
          <th>ポイント</th>
        </tr>
      </thead>
      <tbody id="ranking-table">
        <tr><td colspan="3" class="loading">データ準備中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active-tab" onclick="switchTab('input')">📝 入力</div>
  <div class="tab" onclick="switchTab('ranking')">🏆 ランキング</div>
</div>

<script>
  // あなたが発行した合鍵（URL）
  const GAS_URL = "https://script.google.com/macros/s/AKfycbz2dFZn26meybu13XCm7W5opCblxMOZnLod2sH6jRdgILocWf53rOYiiDyAkrvNTlU/exec";
  let ratings = {};

  // アプリを開いた時に、自動で黒板のデータを読みに行く
  window.onload = async () => {
    try {
      const response = await fetch(GAS_URL);
      ratings = await response.json();
      
      // 読み込み完了したら入力画面を表示
      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('input-area').style.display = 'block';
      
      updateSelectBoxes();
      updateRanking();
    } catch(e) {
      alert("通信エラー：スプレッドシートへのアクセス権限（全員に公開）を確認してください。");
    }
  };

  function switchTab(tabName) {
    document.getElementById('input-page').classList.remove('active');
    document.getElementById('ranking-page').classList.remove('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));

    if (tabName === 'input') {
      document.getElementById('input-page').classList.add('active');
      document.querySelectorAll('.tab')[0].classList.add('active-tab');
    } else {
      updateRanking();
      document.getElementById('ranking-page').classList.add('active');
      document.querySelectorAll('.tab')[1].classList.add('active-tab');
    }
  }

  function updateSelectBoxes() {
    const boxA = document.getElementById('playerA');
    const boxB = document.getElementById('playerB');
    boxA.innerHTML = ''; boxB.innerHTML = '';
    
    Object.keys(ratings).forEach(p => {
      boxA.innerHTML += `<option value="${p}">${p}</option>`;
      boxB.innerHTML += `<option value="${p}">${p}</option>`;
    });
    if(boxB.options.length > 1) boxB.selectedIndex = 1;
  }

  function changeScore(id, amount) {
    let el = document.getElementById(id);
    let score = parseInt(el.innerText) + amount;
    if (score < 0) score = 0;
    if (score > 3) score = 3; 
    el.innerText = score;
  }

  async function recordMatch() {
    const pA = document.getElementById('playerA').value;
    const pB = document.getElementById('playerB').value;
    const sA = parseInt(document.getElementById('scoreA').innerText);
    const sB = parseInt(document.getElementById('scoreB').innerText);

    if (pA === pB) { alert("同じ人が選ばれています！"); return; }
    if (sA < 3 && sB < 3) { alert("どちらかが3セット先取するまで記録できません！"); return; }

    const winner = sA === 3 ? pA : pB;
    const loser = sA === 3 ? pB : pA;
    const rW = ratings[winner] || 1500;
    const rL = ratings[loser] || 1500;

    const expectedW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
    const pointChange = Math.round(32 * (1 - expectedW));

    // 通信中のボタンの見た目を変える
    const btn = document.getElementById('submit-btn');
    btn.innerText = "黒板に書き込み中...";
    btn.disabled = true;
    btn.style.backgroundColor = "#6c757d";

    try {
      // 魔法の黒板（スプレッドシート）にデータを送る
      const res = await fetch(GAS_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ winner: winner, loser: loser, pointChange: pointChange })
      });
      
      // 最新のランキングを受け取る
      ratings = await res.json();
      alert(`【結果】\n${winner}さんが ${pointChange}ポイント 奪い取りました！`);
      
      // 入力欄をゼロに戻す
      document.getElementById('scoreA').innerText = '0';
      document.getElementById('scoreB').innerText = '0';
      updateRanking();

    } catch(e) {
      alert("送信に失敗しました。電波の良いところで再度お試しください。");
    } finally {
      // ボタンを元に戻す
      btn.innerText = "結果を記録する";
      btn.disabled = false;
      btn.style.backgroundColor = "#28a745";
    }
  }

  function updateRanking() {
    const tbody = document.getElementById('ranking-table');
    tbody.innerHTML = '';
    const sorted = Object.entries(ratings).sort((a, b) => b[1] - a[1]);

    sorted.forEach((player, index) => {
      let rankClass = '';
      if (index === 0) rankClass = 'rank-1';
      else if (index === 1) rankClass = 'rank-2';
      else if (index === 2) rankClass = 'rank-3';

      tbody.innerHTML += `
        <tr>
          <td class="${rankClass}">${index + 1}位</td>
          <td>${player[0]}</td>
          <td>${player[1]}点</td>
        </tr>
      `;
    });
  }
</script>
</body>
</html>
