<!DOCTYPE >
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FUJIYAMA 頂上決戦</title>
<style>
  body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #121212; color: #ffffff; padding-bottom: 70px; }
  .header { background: linear-gradient(135deg, #d32f2f, #ff8f00); color: white; padding: 20px; text-align: center; font-size: 22px; font-weight: 900; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); border-bottom: 3px solid #ffcc00; }
  .container { padding: 15px; display: none; }
  .active { display: block; }
  .card { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); border: 1px solid #333; margin-bottom: 15px; }
  select, button { width: 100%; padding: 14px; margin: 10px 0; font-size: 18px; font-weight: bold; border-radius: 8px; border: 2px solid #555; background: #2c2c2c; color: #fff; }
  .score-board { display: flex; justify-content: space-between; align-items: center; text-align: center; margin: 20px 0; }
  .score-btn { width: 55px; height: 55px; font-size: 28px; background-color: #333; border: 2px solid #555; border-radius: 8px; color: #fff; }
  .score-btn:active { background-color: #555; }
  .score-num { font-size: 40px; font-weight: 900; width: 50px; color: #ffcc00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); }
  .submit-btn { background: linear-gradient(135deg, #b71c1c, #e53935); color: white; border: none; margin-top: 25px; padding: 18px; font-size: 20px; text-shadow: 1px 1px 3px rgba(0,0,0,0.6); box-shadow: 0 4px 15px rgba(229, 57, 53, 0.4); }
  .tab-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #1a1a1a; border-top: 2px solid #333; }
  .tab { flex: 1; padding: 12px 5px; text-align: center; font-size: 13px; font-weight: bold; color: #888; transition: 0.3s; }
  .tab.active-tab { color: #ff5722; border-bottom: 4px solid #ff5722; background: #2a2a2a; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 16px; }
  th, td { padding: 15px 10px; border-bottom: 1px solid #333; text-align: left; }
  th { background-color: #222; color: #aaa; text-transform: uppercase; font-size: 14px; }
  .rank-1 { color: #ffd700; font-weight: 900; font-size: 18px; text-shadow: 0 0 8px rgba(255,215,0,0.5); }
  .rank-2 { color: #c0c0c0; font-weight: bold; }
  .rank-3 { color: #cd7f32; font-weight: bold; }
  .loading { text-align: center; color: #ff5722; padding: 20px; font-size: 14px; font-weight: bold; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
  .history-item { border-bottom: 1px solid #333; padding: 12px 0; }
  .history-date { font-size: 12px; color: #888; margin-bottom: 5px; }
  .history-text { font-size: 16px; font-weight: bold; line-height: 1.4; }
  .highlight { color: #ffcc00; font-size: 18px; }
</style>
</head>
<body>

<div class="header">🔥 TEAM FUJIYAMA 🔥<br><span style="font-size: 14px;">下剋上ランキング</span></div>

<div id="input-page" class="container active">
  <div class="card">
    <div id="loading-msg" class="loading">📡 戦況データを読み込み中...</div>
    <div id="input-area" style="display:none;">
      <div style="text-align:center; color:#ff5722; font-size:14px; font-weight:bold; margin-bottom:15px;">⚔️ 3セット先取のデスマッチ ⚔️</div>
      <label style="color:#aaa; font-size:12px;">【挑戦者】選手A</label>
      <select id="playerA"></select>
      <div class="score-board">
        <button class="score-btn" onclick="changeScore('scoreA', -1)">-</button>
        <div id="scoreA" class="score-num">0</div>
        <button class="score-btn" onclick="changeScore('scoreA', 1)">+</button>
      </div>
      <hr style="border:0; border-top:2px dashed #444; margin:25px 0;">
      <label style="color:#aaa; font-size:12px;">【対戦相手】選手B</label>
      <select id="playerB"></select>
      <div class="score-board">
        <button class="score-btn" onclick="changeScore('scoreB', -1)">-</button>
        <div id="scoreB" class="score-num">0</div>
        <button class="score-btn" onclick="changeScore('scoreB', 1)">+</button>
      </div>
      <button id="submit-btn" class="submit-btn" onclick="recordMatch()">結果を叩き込む</button>
    </div>
  </div>
</div>

<div id="ranking-page" class="container">
  <div class="card">
    <table>
      <thead>
        <tr><th>順位</th><th>名前</th><th>戦闘力</th></tr>
      </thead>
      <tbody id="ranking-table"></tbody>
    </table>
  </div>
</div>

<div id="history-page" class="container">
  <div class="card">
    <h3 style="text-align:center; color:#ff5722; margin-top:0; border-bottom: 2px solid #333; padding-bottom: 10px;">⚔️ 激闘の記憶</h3>
    <div id="history-list"></div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active-tab" onclick="switchTab('input')">⚔️<br>入力</div>
  <div class="tab" onclick="switchTab('ranking')">👑<br>頂上</div>
  <div class="tab" onclick="switchTab('history')">📜<br>記録</div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyF5Di65Jwkkdx2QaDq1_BjNJfIeFGjXoMnAuOusSDivXb3NO93bNpD8nfXLSFaV0w/exec";
  let ratings = {};
  let matchHistory = [];

  window.onload = async () => {
    try {
      const response = await fetch(GAS_URL);
      const data = await response.json();
      ratings = data.ratings;
      matchHistory = data.history || [];
      
      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('input-area').style.display = 'block';
      updateSelectBoxes();
      updateRanking();
      updateHistory();
    } catch(e) {
      alert("通信エラー：ネット接続を確認してください。");
    }
  };

  function switchTab(tabName) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));

    document.getElementById(tabName + '-page').classList.add('active');
    
    if (tabName === 'input') document.querySelectorAll('.tab')[0].classList.add('active-tab');
    if (tabName === 'ranking') document.querySelectorAll('.tab')[1].classList.add('active-tab');
    if (tabName === 'history') document.querySelectorAll('.tab')[2].classList.add('active-tab');
  }

  function updateSelectBoxes() {
    const boxA = document.getElementById('playerA');
    const boxB = document.getElementById('playerB');
    boxA.innerHTML = ''; boxB.innerHTML = '';
    Object.keys(ratings).forEach(p => {
      boxA.innerHTML += `<option value="${p}">${p}</option>`;
      boxB.innerHTML += `<option value="${p}">${p}</option>`;
    });
    if(boxB.options.length > 1) boxB.selectedIndex = 1;
  }

  function changeScore(id, amount) {
    let el = document.getElementById(id);
    let score = parseInt(el.innerText) + amount;
    if (score < 0) score = 0;
    if (score > 3) score = 3; 
    el.innerText = score;
  }

  async function recordMatch() {
    const pA = document.getElementById('playerA').value;
    const pB = document.getElementById('playerB').value;
    const sA = parseInt(document.getElementById('scoreA').innerText);
    const sB = parseInt(document.getElementById('scoreB').innerText);

    if (pA === pB) { alert("同じ選手が選ばれています！"); return; }
    if (sA < 3 && sB < 3) { alert("3セット先取するまで決着はつきません！"); return; }

    const winner = sA === 3 ? pA : pB;
    const loser = sA === 3 ? pB : pA;
    const rW = ratings[winner] || 1500;
    const rL = ratings[loser] || 1500;

    const expectedW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
    const pointChange = Math.round(32 * (1 - expectedW));

    const btn = document.getElementById('submit-btn');
    btn.innerText = "本部へ送信中...🔥";
    btn.disabled = true;
    btn.style.background = "#555";

    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ winner: winner, loser: loser, pointChange: pointChange })
      });
      
      const data = await res.json();
      ratings = data.ratings;
      matchHistory = data.history || [];
      
      alert(`🔥🔥 下剋上達成！ 🔥🔥\n\n${winner} が ${loser} を撃破！\n${pointChange}ポイントを強奪！`);
      
      document.getElementById('scoreA').innerText = '0';
      document.getElementById('scoreB').innerText = '0';
      updateRanking();
      updateHistory();
      switchTab('history'); // 記録後、自動的に履歴タブに移動して盛り上げる

    } catch(e) {
      alert("送信失敗！電波の届く場所でもう一度叩き込んでください。");
    } finally {
      btn.innerText = "結果を叩き込む";
      btn.disabled = false;
      btn.style.background = "linear-gradient(135deg, #b71c1c, #e53935)";
    }
  }

  function updateRanking() {
    const tbody = document.getElementById('ranking-table');
    tbody.innerHTML = '';
    const sorted = Object.entries(ratings).sort((a, b) => b[1] - a[1]);

    sorted.forEach((player, index) => {
      let rankClass = '';
      let crown = '';
      if (index === 0) { rankClass = 'rank-1'; crown = '👑 '; }
      else if (index === 1) rankClass = 'rank-2';
      else if (index === 2) rankClass = 'rank-3';

      tbody.innerHTML += `
        <tr>
          <td class="${rankClass}">${crown}${index + 1}位</td>
          <td style="font-weight:bold;">${player[0]}</td>
          <td class="${rankClass}">${player[1]} pt</td>
        </tr>
      `;
    });
  }

  function updateHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    if(matchHistory.length === 0) {
      list.innerHTML = '<div style="text-align:center; color:#888;">まだ激闘の記録はありません</div>';
      return;
    }
    matchHistory.forEach(h => {
      list.innerHTML += `
        <div class="history-item">
          <div class="history-date">${h.date}</div>
          <div class="history-text">
            🔥 <span class="highlight">${h.winner}</span> が ${h.loser} を撃破！<br>
            <span style="color:#4CAF50; font-size:14px;">(＋${h.point} pt 強奪)</span>
          </div>
        </div>
      `;
    });
  }
</script>
</body>
</html>
